name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Install system deps (Linux native)
        if: runner.os == 'Linux' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libflac-dev
      - name: Install FLAC (macOS)
        if: runner.os == 'macOS'
        run: brew install flac
      - name: Build release
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cargo build --release --target ${{ matrix.target }} -p snapserver-rs
          else
            cargo build --release --target ${{ matrix.target }} -p snapclient-rs
            cargo build --release --target ${{ matrix.target }} -p snapserver-rs --features flac
          fi
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: snapcast-rs-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/snapclient-rs
            target/${{ matrix.target }}/release/snapclient-rs.exe
            target/${{ matrix.target }}/release/snapserver-rs
            target/${{ matrix.target }}/release/snapserver-rs.exe

  upload-release-artifacts:
    name: Upload Release Artifacts
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: snapcast-rs-*/snapclient-rs*,snapcast-rs-*/snapserver-rs*

  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (order matters — proto first)
        run: |
          cargo publish -p snapcast-proto --token ${{ secrets.CRATES_IO_TOKEN }}
          sleep 30
          cargo publish -p snapcast-client --token ${{ secrets.CRATES_IO_TOKEN }}
          sleep 30
          cargo publish -p snapcast-server --token ${{ secrets.CRATES_IO_TOKEN }}
