[package]
name = "snapcast-server"
description = "Snapcast server library — embeddable synchronized multiroom audio server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
snapcast-proto = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
hostname = { workspace = true }
libc = { workspace = true }
mdns-sd = { workspace = true }

# Encoders — all optional
flac-codec = { version = "1.3", optional = true }
audiopus = { workspace = true, optional = true }
vorbis_rs = { version = "0.5", optional = true }
ogg = { version = "0.9", optional = true }
jsonwebtoken = { version = "10.3", features = ["rust_crypto"] }

[features]
default = ["flac"]
flac = ["dep:flac-codec"]
opus = ["dep:audiopus"]
vorbis = ["dep:vorbis_rs", "dep:ogg"]
